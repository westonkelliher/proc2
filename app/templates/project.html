<!doctype html>
<html>
<head>
  <title>proc2 — {{ p.name }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: 0.2rem; }
    .small { font-size: 0.85em; }
    .bar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
    form.edit { display: flex; flex-direction: column; gap: 0.5rem; }
    form.inline { display: inline-flex; gap: 0.3rem; }
    input[type=text], textarea { padding: 0.4rem; font: inherit; width: 100%; box-sizing: border-box; }
    textarea { min-height: 260px; font-family: ui-monospace, monospace; }
    button { padding: 0.35rem 0.7rem; font: inherit; cursor: pointer; }
    label { font-size: 0.85em; color: #555; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <div class="bar">
    <h1>{{ p.name }}</h1>
    <a href="/projects">← projects</a>
  </div>
  <p class="small"><a href="/">tasks</a> · <a href="/projects">projects</a></p>

  <form class="edit" action="/projects/{{ p.id }}/edit" method="post">
    <label>name
      <input type="text" name="name" value="{{ p.name }}" required>
    </label>
    <label>description
      <input type="text" name="description" value="{{ p.description }}">
    </label>
    <label>notes
      <textarea name="notes">{{ p.notes }}</textarea>
    </label>
    <div>
      <button>save</button>
    </div>
  </form>

  <hr>

  <form class="inline" action="/projects/{{ p.id }}/delete" method="post"
        onsubmit="return confirm('delete project {{ p.name }}?');">
    <button class="small">delete project</button>
  </form>
</body>
</html>
