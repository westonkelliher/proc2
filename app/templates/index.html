<!doctype html>
<html>
<head>
  <title>proc2</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    ul { padding-left: 1.2rem; }
    li { margin: 0.25rem 0; }
    .desc { color: #666; font-size: 0.9em; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    input[type=text] { flex: 1; padding: 0.4rem; }
    button { padding: 0.4rem 0.8rem; }
  </style>
</head>
<body>
  <h1>proc2</h1>
  <form hx-post="/tasks" hx-target="#tasks" hx-swap="outerHTML" hx-on::after-request="this.reset()">
    <input type="text" name="title" placeholder="title" required>
    <input type="text" name="description" placeholder="description">
    <button type="submit">add</button>
  </form>
  {% include "_tasks.html" %}
</body>
</html>
